<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('User Management')}"></head>
<body class="admin-theme">
<div th:replace="~{fragments/header :: siteHeader('admin')}"></div>

<main class="section-shell">
    <div class="site-shell">
        <section class="panel reveal">
            <div class="section-heading compact">
                <span class="eyebrow">Member 1</span>
                <h1>User Management</h1>
            </div>
            <form method="get" th:action="@{/admin/users}" class="search-panel inline">
                <label class="wide-input">
                    Search users
                    <input type="text" name="query" th:value="${query}" placeholder="Name, email, genre, loyalty tier">
                </label>
                <button class="primary-btn" type="submit">Search</button>
            </form>
        </section>

        <section class="card-list">
            <article class="panel user-card reveal" th:each="user : ${users}">
                <div>
                    <h2 th:text="${user.fullName}">User Name</h2>
                    <p class="muted" th:text="${user.email}">email</p>
                    <div class="chip-row">
                        <span class="badge" th:text="${user.favoriteGenre}">Genre</span>
                        <span class="badge" th:text="${user.loyaltyTier}">Tier</span>
                        <span class="badge" th:text="${user.active ? 'Active' : 'Inactive'}">Status</span>
                    </div>
                    <p th:text="${user.shippingAddress}">Address</p>
                </div>
                <form th:action="@{'/admin/users/' + ${user.id} + '/delete'}" method="post">
                    <button class="danger-btn compact" type="submit">Delete User</button>
                </form>
            </article>
        </section>
    </div>
</main>

<div th:replace="~{fragments/alerts :: flashMessages}"></div>
<div th:replace="~{fragments/footer :: siteFooter}"></div>
</body>
</html>
